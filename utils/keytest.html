<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSW Key Test</title>
  <style>
    body {
      background: #1a1a1a;
      color: #f0f0f0;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    p {
      color: #aaa;
      margin-bottom: 2rem;
    }
    #output {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 2rem 3rem;
      text-align: center;
      min-width: 300px;
    }
    #key-name {
      font-size: 2rem;
      color: #4af;
      margin-bottom: 0.5rem;
    }
    #key-code {
      font-size: 1rem;
      color: #aaa;
    }
    #log {
      margin-top: 2rem;
      width: 400px;
      max-height: 200px;
      overflow-y: auto;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.85rem;
      color: #ccc;
    }
    .log-entry {
      border-bottom: 1px solid #333;
      padding: 0.25rem 0;
    }
  </style>
</head>
<body>
  <h1>TSW Side Button Key Tester</h1>
  <p>Press a side button to see its key name</p>

  <div id="output">
    <div id="key-name">—</div>
    <div id="key-code">waiting for input...</div>
  </div>

  <div id="log"></div>

  <script>
    const keyName = document.getElementById("key-name");
    const keyCode = document.getElementById("key-code");
    const log     = document.getElementById("log");

    document.addEventListener("keydown", function (e) {
      e.preventDefault();

      keyName.textContent = e.key;
      keyCode.textContent = `code: ${e.code}  keyCode: ${e.keyCode}`;

      const entry = document.createElement("div");
      entry.className = "log-entry";
      entry.textContent = `key: ${e.key}  code: ${e.code}  keyCode: ${e.keyCode}`;
      log.prepend(entry);
    });
  </script>
</body>
</html>
